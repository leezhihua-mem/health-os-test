<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥔 土豆智能体 - 健康预警测试（简化版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .warning-selector {
            margin-bottom: 30px;
        }
        
        .warning-selector label {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }
        
        .warning-types {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        
        .warning-type-btn {
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .warning-type-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .warning-type-btn.active {
            background: #667eea;
            color: white;
            font-weight: bold;
        }
        
        .input-section {
            margin-bottom: 30px;
            display: none;
        }
        
        .input-section.active {
            display: block;
        }
        
        .input-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #666;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        .input-group input:focus, .input-group select:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .auto-calculated {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #4caf50;
            margin-bottom: 20px;
        }
        
        .auto-calculated label {
            color: #4caf50;
            font-weight: bold;
        }
        
        .auto-calculated .value {
            font-size: 24px;
            font-weight: bold;
            color: #2e7d32;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
        }
        
        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .result-section.red {
            background: #ffebee;
            border: 3px solid #f44336;
        }
        
        .result-section.yellow {
            background: #fff8e1;
            border: 3px solid #ffc107;
        }
        
        .result-section.green {
            background: #e8f5e9;
            border: 3px solid #4caf50;
        }
        
        .result-section.normal {
            background: #e3f2fd;
            border: 3px solid #2196f3;
        }
        
        .result-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .result-icon {
            font-size: 48px;
            margin-right: 20px;
        }
        
        .result-title {
            font-size: 24px;
            font-weight: bold;
        }
        
        .result-section.red .result-title {
            color: #f44336;
        }
        
        .result-section.yellow .result-title {
            color: #ffc107;
        }
        
        .result-section.green .result-title {
            color: #4caf50;
        }
        
        .result-section.normal .result-title {
            color: #2196f3;
        }
        
        .result-details {
            margin-top: 20px;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }
        
        .result-item strong {
            color: #333;
        }
        
        .disclaimer {
            margin-top: 30px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            border: 2px solid #ffc107;
            color: #856404;
            font-size: 14px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥔 土豆智能体</h1>
            <div class="subtitle">健康预警测试（简化版，易于使用）</div>
        </div>
        
        <!-- 预警类型选择 -->
        <div class="warning-selector">
            <label>选择预警类型：</label>
            <div class="warning-types">
                <button class="warning-type-btn active" data-type="bp">血压预警</button>
                <button class="warning-type-btn" data-type="glucose">血糖预警</button>
                <button class="warning-type-btn" data-type="hr">心率预警</button>
                <button class="warning-type-btn" data-type="lipid">血脂预警</button>
                <button class="warning-type-btn" data-type="weight">体重预警</button>
            </div>
        </div>
        
        <!-- 血压预警输入 -->
        <div class="input-section active" id="bp-input">
            <h2>血压数据输入（简化版）</h2>
            
            <div class="input-group">
                <label>最新收缩压（mmHg）：</label>
                <input type="number" id="bp-sbp" placeholder="例如：140">
            </div>
            
            <div class="input-group">
                <label>最新舒张压（mmHg）：</label>
                <input type="number" id="bp-dbp" placeholder="例如：90">
            </div>
            
            <!-- 自动计算脉压差 -->
            <div class="auto-calculated">
                <label>脉压差（PP）自动计算：</label>
                <div class="value" id="bp-pp-value">等待输入...</div>
            </div>
            
            <div class="input-group">
                <label>血压波动程度：</label>
                <select id="bp-bpv">
                    <option value="0">稳定（血压变化小）</option>
                    <option value="1">波动（血压变化中等）</option>
                    <option value="2">极波动（血压变化大）</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>晨峰高血压：</label>
                <select id="bp-mh">
                    <option value="0">正常（早晨血压不高）</option>
                    <option value="1">偏高（早晨血压偏高）</option>
                    <option value="2">极高（早晨血压极高）</option>
                </select>
            </div>
        </div>
        
        <!-- 血糖预警输入 -->
        <div class="input-section" id="glucose-input">
            <h2>血糖数据输入（简化版）</h2>
            
            <div class="input-group">
                <label>空腹血糖（mmol/L）：</label>
                <input type="number" id="glucose-fasting" placeholder="例如：6.0">
            </div>
            
            <div class="input-group">
                <label>餐后血糖（mmol/L）：</label>
                <input type="number" id="glucose-postprandial" placeholder="例如：8.0">
            </div>
            
            <div class="input-group">
                <label>糖化血红蛋白（HbA1c）：</label>
                <select id="glucose-hba1c">
                    <option value="0">正常（<6.0%）</option>
                    <option value="1">偏高（6.0-6.5%）</option>
                    <option value="2">极高（≥7.0%）</option>
                </select>
            </div>
        </div>
        
        <!-- 心率预警输入 -->
        <div class="input-section" id="hr-input">
            <h2>心率数据输入（简化版）</h2>
            
            <div class="input-group">
                <label>静息心率（bpm）：</label>
                <input type="number" id="hr-resting" placeholder="例如：75">
            </div>
            
            <div class="input-group">
                <label>运动后心率恢复：</label>
                <select id="hr-recovery">
                    <option value="0">快（恢复良好）</option>
                    <option value="1">中（恢复中等）</option>
                    <option value="2">慢（恢复差）</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>心率变异性（HRV）：</label>
                <select id="hr-hrv">
                    <option value="0">高（健康）</option>
                    <option value="1">中（中等）</option>
                    <option value="2">低（风险高）</option>
                </select>
            </div>
        </div>
        
        <!-- 血脂预警输入 -->
        <div class="input-section" id="lipid-input">
            <h2>血脂数据输入（简化版）</h2>
            
            <div class="input-group">
                <label>LDL-C（坏胆固醇）：</label>
                <select id="lipid-ldl">
                    <option value="0">正常（<2.6 mmol/L）</option>
                    <option value="1">偏高（2.6-3.4 mmol/L）</option>
                    <option value="2">极高（≥4.9 mmol/L）</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>HDL-C（好胆固醇）：</label>
                <select id="lipid-hdl">
                    <option value="0">高（健康）</option>
                    <option value="1">中（中等）</option>
                    <option value="2">低（风险高）</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>甘油三酯（TG）：</label>
                <select id="lipid-tg">
                    <option value="0">正常（<1.5 mmol/L）</option>
                    <option value="1">偏高（1.5-1.7 mmol/L）</option>
                    <option value="2">极高（≥2.3 mmol/L）</option>
                </select>
            </div>
        </div>
        
        <!-- 体重预警输入 -->
        <div class="input-section" id="weight-input">
            <h2>体重数据输入（简化版）</h2>
            
            <div class="input-group">
                <label>身高（cm）：</label>
                <input type="number" id="weight-height" placeholder="例如：170">
            </div>
            
            <div class="input-group">
                <label>体重（kg）：</label>
                <input type="number" id="weight-kg" placeholder="例如：70">
            </div>
            
            <!-- 自动计算BMI -->
            <div class="auto-calculated">
                <label>BMI自动计算：</label>
                <div class="value" id="weight-bmi-value">等待输入...</div>
            </div>
            
            <div class="input-group">
                <label>腰围（cm）：</label>
                <input type="number" id="weight-waist" placeholder="例如：85">
            </div>
            
            <div class="input-group">
                <label>体脂率：</label>
                <select id="weight-fat">
                    <option value="0">低（健康）</option>
                    <option value="1">中（中等）</option>
                    <option value="2">高（风险高）</option>
                </select>
            </div>
        </div>
        
        <!-- 计算按钮 -->
        <button class="calculate-btn" onclick="calculateWarning()">计算预警</button>
        
        <!-- 结果显示 -->
        <div class="result-section" id="result">
            <div class="result-header">
                <div class="result-icon" id="result-icon">🔴</div>
                <div class="result-title" id="result-title">红色预警</div>
            </div>
            <div class="result-details" id="result-details"></div>
        </div>
        
        <!-- 免责声明 -->
        <div class="disclaimer">
            ⚠️ 本预警仅供参考，不替代医生诊断。如有疑问，请咨询专业医生。
            <br><br>
            循证来源：CDC 2025 / Framingham Heart Study / AHA 2025心血管指南
        </div>
        
        <!-- Footer -->
        <div class="footer">
            🥔 土豆智能体系统 - 健康预警测试（简化版）v2.0.0
            <br>
            Powered by OpenClaw + 纯规则引擎（模型无关）
        </div>
    </div>
    
    <script>
        // 预警类型切换
        const warningTypeBtns = document.querySelectorAll('.warning-type-btn');
        const inputSections = {
            'bp': document.getElementById('bp-input'),
            'glucose': document.getElementById('glucose-input'),
            'hr': document.getElementById('hr-input'),
            'lipid': document.getElementById('lipid-input'),
            'weight': document.getElementById('weight-input')
        };
        
        let currentWarningType = 'bp';
        
        warningTypeBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有active
                warningTypeBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // 切换输入区域
                const type = this.dataset.type;
                currentWarningType = type;
                
                // 隐藏所有输入区域
                Object.values(inputSections).forEach(section => {
                    section.classList.remove('active');
                });
                
                // 显示当前输入区域
                if (inputSections[type]) {
                    inputSections[type].classList.add('active');
                }
                
                // 隐藏结果
                document.getElementById('result').style.display = 'none';
            });
        });
        
        // 自动计算脉压差（PP）
        document.getElementById('bp-sbp').addEventListener('input', autoCalculatePP);
        document.getElementById('bp-dbp').addEventListener('input', autoCalculatePP);
        
        function autoCalculatePP() {
            const sbp = parseFloat(document.getElementById('bp-sbp').value) || 0;
            const dbp = parseFloat(document.getElementById('bp-dbp').value) || 0;
            
            if (sbp > 0 && dbp > 0) {
                const pp = sbp - dbp;
                document.getElementById('bp-pp-value').textContent = pp.toFixed(0) + ' mmHg';
            } else {
                document.getElementById('bp-pp-value').textContent = '等待输入...';
            }
        }
        
        // 自动计算BMI
        document.getElementById('weight-height').addEventListener('input', autoCalculateBMI);
        document.getElementById('weight-kg').addEventListener('input', autoCalculateBMI);
        
        function autoCalculateBMI() {
            const heightCm = parseFloat(document.getElementById('weight-height').value) || 0;
            const weightKg = parseFloat(document.getElementById('weight-kg').value) || 0;
            
            if (heightCm > 0 && weightKg > 0) {
                const heightM = heightCm / 100;
                const bmi = weightKg / (heightM * heightM);
                document.getElementById('weight-bmi-value').textContent = bmi.toFixed(2) + ' kg/m²';
            } else {
                document.getElementById('weight-bmi-value').textContent = '等待输入...';
            }
        }
        
        // 计算预警
        function calculateWarning() {
            let result;
            
            if (currentWarningType === 'bp') {
                result = calculateBloodPressureWarning();
            } else if (currentWarningType === 'glucose') {
                result = calculateBloodGlucoseWarning();
            } else if (currentWarningType === 'hr') {
                result = calculateHeartRateWarning();
            } else if (currentWarningType === 'lipid') {
                result = calculateBloodLipidWarning();
            } else if (currentWarningType === 'weight') {
                result = calculateBodyWeightWarning();
            }
            
            displayResult(result);
        }
        
        // 血压预警计算（简化版）
        function calculateBloodPressureWarning() {
            const sbp = parseFloat(document.getElementById('bp-sbp').value) || 0;
            const dbp = parseFloat(document.getElementById('bp-dbp').value) || 0;
            const bpvLevel = parseInt(document.getElementById('bp-bpv').value);
            const mhLevel = parseInt(document.getElementById('bp-mh').value);
            
            // 自动计算PP评分
            const pp = sbp - dbp;
            let ppScore = 0;
            if (pp >= 60) ppScore = 3;
            else if (pp >= 50) ppScore = 2;
            else if (pp >= 40) ppScore = 1;
            
            // BPV评分（用户选择）
            const bpvScore = bpvLevel + 1;
            
            // MH评分（用户选择）
            const mhScore = mhLevel + 1;
            
            const totalScore = bpvScore + ppScore + mhScore;
            
            return buildResult('血压预警', totalScore, [
                `收缩压：${sbp} mmHg`,
                `舒张压：${dbp} mmHg`,
                `脉压差（PP）：${pp} mmHg（评分：${ppScore}分）`,
                `血压波动：${bpvLevel === 0 ? '稳定' : bpvLevel === 1 ? '波动' : '极波动'}（评分：${bpvScore}分）`,
                `晨峰高血压：${mhLevel === 0 ? '正常' : mhLevel === 1 ? '偏高' : '极高'}（评分：${mhScore}分）`,
                `总分：${totalScore}分`
            ], 'Framingham Heart Study');
        }
        
        // 血糖预警计算（简化版）
        function calculateBloodGlucoseWarning() {
            const fasting = parseFloat(document.getElementById('glucose-fasting').value) || 0;
            const postprandial = parseFloat(document.getElementById('glucose-postprandial').value) || 0;
            const hba1cLevel = parseInt(document.getElementById('glucose-hba1c').value);
            
            // 空腹血糖评分
            let fastingScore = 0;
            if (fasting >= 7.0) fastingScore = 3;
            else if (fasting >= 6.1) fastingScore = 2;
            else if (fasting >= 5.6) fastingScore = 1;
            
            // 餐后血糖评分
            let postprandialScore = 0;
            if (postprandial >= 11.1) postprandialScore = 3;
            else if (postprandial >= 8.0) postprandialScore = 2;
            else if (postprandial >= 7.0) postprandialScore = 1;
            
            // HbA1c评分（用户选择）
            const hba1cScore = hba1cLevel + 1;
            
            const totalScore = fastingScore + postprandialScore + hba1cScore;
            
            return buildResult('血糖预警', totalScore, [
                `空腹血糖：${fasting} mmol/L（评分：${fastingScore}分）`,
                `餐后血糖：${postprandial} mmol/L（评分：${postprandialScore}分）`,
                `HbA1c：${hba1cLevel === 0 ? '正常' : hba1cLevel === 1 ? '偏高' : '极高'}（评分：${hba1cScore}分）`,
                `总分：${totalScore}分`
            ], 'CDC 2025糖尿病指南');
        }
        
        // 心率预警计算（简化版）
        function calculateHeartRateWarning() {
            const resting = parseFloat(document.getElementById('hr-resting').value) || 0;
            const recoveryLevel = parseInt(document.getElementById('hr-recovery').value);
            const hrvLevel = parseInt(document.getElementById('hr-hrv').value);
            
            // 静息心率评分
            let restingScore = 0;
            if (resting >= 100) restingScore = 3;
            else if (resting >= 80) restingScore = 2;
            else if (resting >= 60) restingScore = 1;
            
            // 心率恢复评分（用户选择）
            const recoveryScore = recoveryLevel + 1;
            
            // HRV评分（用户选择）
            const hrvScore = hrvLevel + 1;
            
            const totalScore = restingScore + recoveryScore + hrvScore;
            
            return buildResult('心率预警', totalScore, [
                `静息心率：${resting} bpm（评分：${restingScore}分）`,
                `心率恢复：${recoveryLevel === 0 ? '快' : recoveryLevel === 1 ? '中' : '慢'}（评分：${recoveryScore}分）`,
                `心率变异性：${hrvLevel === 0 ? '高' : hrvLevel === 1 ? '中' : '低'}（评分：${hrvScore}分）`,
                `总分：${totalScore}分`
            ], 'AHA 2025心血管指南');
        }
        
        // 血脂预警计算（简化版）
        function calculateBloodLipidWarning() {
            const ldlLevel = parseInt(document.getElementById('lipid-ldl').value);
            const hdlLevel = parseInt(document.getElementById('lipid-hdl').value);
            const tgLevel = parseInt(document.getElementById('lipid-tg').value);
            
            // LDL-C评分（用户选择）
            const ldlScore = ldlLevel + 1;
            
            // HDL-C评分（用户选择）
            const hdlScore = hdlLevel + 1;
            
            // TG评分（用户选择）
            const tgScore = tgLevel + 1;
            
            const totalScore = ldlScore + hdlScore + tgScore;
            
            return buildResult('血脂预警', totalScore, [
                `LDL-C：${ldlLevel === 0 ? '正常' : ldlLevel === 1 ? '偏高' : '极高'}（评分：${ldlScore}分）`,
                `HDL-C：${hdlLevel === 0 ? '高' : hdlLevel === 1 ? '中' : '低'}（评分：${hdlScore}分）`,
                `TG：${tgLevel === 0 ? '正常' : tgLevel === 1 ? '偏高' : '极高'}（评分：${tgScore}分）`,
                `总分：${totalScore}分`
            ], '中国血脂管理指南2025');
        }
        
        // 体重预警计算（简化版）
        function calculateBodyWeightWarning() {
            const heightCm = parseFloat(document.getElementById('weight-height').value) || 0;
            const weightKg = parseFloat(document.getElementById('weight-kg').value) || 0;
            const waist = parseFloat(document.getElementById('weight-waist').value) || 0;
            const fatLevel = parseInt(document.getElementById('weight-fat').value);
            
            // 自动计算BMI
            const heightM = heightCm / 100;
            const bmi = weightKg / (heightM * heightM);
            
            // BMI评分
            let bmiScore = 0;
            if (bmi >= 28) bmiScore = 3;
            else if (bmi >= 24) bmiScore = 2;
            else if (bmi >= 18.5) bmiScore = 1;
            
            // 腰围评分
            let waistScore = 0;
            if (waist >= 90) waistScore = 3;
            else if (waist >= 85) waistScore = 2;
            else if (waist >= 80) waistScore = 1;
            
            // 体脂率评分（用户选择）
            const fatScore = fatLevel + 1;
            
            const totalScore = bmiScore + waistScore + fatScore;
            
            return buildResult('体重预警', totalScore, [
                `身高：${heightCm} cm`,
                `体重：${weightKg} kg`,
                `BMI：${bmi.toFixed(2)} kg/m²（评分：${bmiScore}分）`,
                `腰围：${waist} cm（评分：${waistScore}分）`,
                `体脂率：${fatLevel === 0 ? '低' : fatLevel === 1 ? '中' : '高'}（评分：${fatScore}分）`,
                `总分：${totalScore}分`
            ], '中国肥胖管理指南2025');
        }
        
        // 构建结果
        function buildResult(warningType, totalScore, details, evidenceSource) {
            let warningLevel, recommendation, icon;
            
            if (totalScore >= 7) {
                warningLevel = '红色预警';
                recommendation = '立即就医，建议进行全面检查';
                icon = '🔴';
            } else if (totalScore >= 4) {
                warningLevel = '黄色预警';
                recommendation = '调整生活方式，建议增加监测频率';
                icon = '🟡';
            } else if (totalScore >= 1) {
                warningLevel = '绿色预警';
                recommendation = '继续保持，建议定期监测';
                icon = '🟢';
            } else {
                warningLevel = '正常';
                recommendation = '健康状态良好，继续保持健康生活方式';
                icon = '✅';
            }
            
            return {
                warningType: warningType,
                warningLevel: warningLevel,
                totalScore: totalScore,
                details: details,
                recommendation: recommendation,
                icon: icon,
                evidenceSource: evidenceSource
            };
        }
        
        // 显示结果
        function displayResult(result) {
            const resultSection = document.getElementById('result');
            const resultIcon = document.getElementById('result-icon');
            const resultTitle = document.getElementById('result-title');
            const resultDetails = document.getElementById('result-details');
            
            // 设置样式
            resultSection.className = 'result-section';
            if (result.warningLevel === '红色预警') {
                resultSection.classList.add('red');
            } else if (result.warningLevel === '黄色预警') {
                resultSection.classList.add('yellow');
            } else if (result.warningLevel === '绿色预警') {
                resultSection.classList.add('green');
            } else {
                resultSection.classList.add('normal');
            }
            
            // 设置内容
            resultIcon.textContent = result.icon;
            resultTitle.textContent = `${result.warningType}：${result.warningLevel}（总分${result.totalScore}分）`;
            
            // 构建详细内容
            let detailsHtml = '';
            result.details.forEach(detail => {
                detailsHtml += `<div class="result-item"><strong>${detail}</strong></div>`;
            });
            detailsHtml += `<div class="result-item"><strong>建议：${result.recommendation}</strong></div>`;
            detailsHtml += `<div class="result-item"><strong>循证来源：${result.evidenceSource}</strong></div>`;
            
            resultDetails.innerHTML = detailsHtml;
            
            // 显示结果
            resultSection.style.display = 'block';
        }
    </script>
</body>
</html>
